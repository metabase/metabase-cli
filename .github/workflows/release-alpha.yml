name: Publish Alpha from Branch

on:
  pull_request:
    types: [labeled]

jobs:
  publish-alpha:
    if: github.event.label.name == 'publish-alpha' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compute alpha version and dist-tag
        id: version
        run: |
          BASE=$(node -p "require('./package.json').version")
          BRANCH="${{ github.event.pull_request.head.ref }}"
          SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//')
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${BASE}-alpha.${SLUG}.${SHORT_SHA}"
          TAG="alpha-${SLUG}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Will publish @metabase/cli@$VERSION with dist-tag $TAG"

      - name: Set package version
        run: npm version --no-git-tag-version --allow-same-version "${{ steps.version.outputs.version }}"

      - name: Build
        run: bun run build

      - name: Publish to NPM
        run: npm publish --tag "${{ steps.version.outputs.tag }}" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_RELEASE_TOKEN }}

      - name: Remove label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            -X DELETE \
            "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/publish-alpha" \
            || true

      - name: Comment on PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" --body "Published \`@metabase/cli@${{ steps.version.outputs.version }}\` with dist-tag \`${{ steps.version.outputs.tag }}\`.

          Install: \`npm install @metabase/cli@${{ steps.version.outputs.tag }}\`"

      - name: Generate workflow summary
        if: always()
        run: |
          tee -a $GITHUB_STEP_SUMMARY << EOF
          ## @metabase/cli alpha publish

          - **Branch**: ${{ github.event.pull_request.head.ref }}
          - **Version**: ${{ steps.version.outputs.version }}
          - **Dist-tag**: ${{ steps.version.outputs.tag }}
          - **Install**: \`npm install @metabase/cli@${{ steps.version.outputs.tag }}\`
          EOF
