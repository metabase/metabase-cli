  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Primary key
  - field: ticket_number
    current:
      description: null
      semantic_type: null
      display_name: Ticket Number
    new:
      description: Human-readable ticket number from the ticketing system (Pylon or Zendesk)
  - field: ticket_subject
    current:
      description: null
      semantic_type: null
      display_name: Ticket Subject
    new:
      description: Subject of the ticket
  - field: comment
    current:
      description: null
      semantic_type: type/Comment
      display_name: Comment
    new:
      description: Body text of the ticket thread
  - field: created_at
    current:
      description: null
      semantic_type: type/CreationTimestamp
      display_name: Created At
