  - field: author_id
    current:
      description: null
      semantic_type: type/Author
      display_name: Author ID
    new:
      description: ID of the person who made the ticket comment; foreign key to the User model
- table: pylon_ticket_link
  table_id: 1872
  dbt_model: pylon_ticket_link
  dbt_source: data_products/pylon/schema.yml
  table_changes:
    description: Links shared within the comments of the ticket threads
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Primary key
  - field: ticket_subject
    current:
      description: null
      semantic_type: null
      display_name: Ticket Subject
    new:
      description: Subject of the ticket
  - field: link
    current:
      description: null
      semantic_type: type/URL
      display_name: Link
    new:
      description: Link that was mentioned
  - field: link_mentioned_at
    current:
      description: null
      semantic_type: null
      display_name: Link Mentioned At
    new:
      description: Timestamp, without time zone, of when the link was first mentioned within the ticket thread
      semantic_type: type/CreationTimestamp
  - field: is_public
    current:
      description: null
      semantic_type: null
      display_name: Is Public
    new:
      description: Whether or not the link is shared publicly for customers to see; links commented by non-Metabase users who are not the ticket requester or a CCed user will be shown as internal notes as well
      semantic_type: type/Category
  - field: is_from_team
    current:
      description: null
      semantic_type: null
      display_name: Is From Team
    new:
      description: Whether or not the link was shared by the Metabase team, including past employees
      semantic_type: type/Category
  - field: link_type
    current:
      description: null
      semantic_type: type/Category
      display_name: Link Type
    new:
      description: Type of the link, such as Metabase Docs, Metabase Learn, Metabase Blog, Metabase Github, Metabase website, Metabase Store, Metabase Discourse, Metabase Tools, meeting link, image attachment, other Github, or Other
  - field: commentor_email
    current:
      description: null
      semantic_type: type/Comment
      display_name: Commentor Email
    new:
      description: Email of the Pylon user who commented the link; past Metabase employees are missing emails and have a placeholder value of "Past Metabase employee" instead
  - field: organization_name
    current:
      description: null
      semantic_type: null
      display_name: Organization Name
    new:
      description: Customer name
  - field: domain
    current:
      description: null
      semantic_type: null
      display_name: Domain
    new:
      description: Email domain of the customer
  - field: ticket_assignee_group
    current:
      description: null
      semantic_type: type/Category
      display_name: Ticket Assignee Group
    new:
      description: The internal group that the ticket assignee belongs to, such as Admins, Billing, Contacts, Partners, Sales, or Success
  - field: organization_id
    current:
      description: null
      semantic_type: null
      display_name: Organization ID
    new:
      description: ID of the customer's Pylon organization; foreign key to the Organization model
  - field: ticket_id
    current:
      description: null
      semantic_type: null
      display_name: Ticket ID
    new:
      description: ID of the Pylon ticket; foreign key to the Ticket model
  - field: commentor_id
    current:
      description: null
      semantic_type: type/Comment
      display_name: Commentor ID
    new:
      description: ID of the Pylon user who commented the link; foreign key to the User model
- table: pylon_ticket_metric
  table_id: 1873
  dbt_model: pylon_ticket_metric
  dbt_source: data_products/pylon/schema.yml
  table_changes:
    description: Time metrics measuring the responsiveness of the Success team
  fields:
  - field: ticket_id
    current:
      description: null
      semantic_type: null
      display_name: Ticket ID
    new:
      description: ID of the Pylon ticket; foreign key to the Ticket model
  - field: ticket_number
    current:
      description: null
      semantic_type: null
      display_name: Ticket Number
    new:
      description: Human-readable ticket number from the ticketing system (Pylon or Zendesk)
  - field: created_at
    current:
      description: null
      semantic_type: type/CreationTimestamp
      display_name: Created At
    new:
      description: Timestamp, without time zone, of when the ticket was submitted by the customer
  - field: solved_at
    current:
      description: null
      semantic_type: null
      display_name: Solved At
    new:
      description: Timestamp, without time zone, of when the ticket was eventually solved
  - field: assignee_updated_at
    current:
      description: null
      semantic_type: type/UpdatedTimestamp
      display_name: Assignee Updated At
    new:
      description: Most recent timestamp, without time zone, of when the ticket was updated by the assignee
  - field: reopens
    current:
      description: null
      semantic_type: null
      display_name: Reopens
    new:
      description: Number of times the ticket has been reopened
  - field: replies
    current:
      description: null
      semantic_type: null
      display_name: Replies
    new:
      description: Number of times a Metabase employee responded to the ticket
  - field: reply_time_in_minutes_calendar
    current:
      description: null
      semantic_type: null
      display_name: Reply Time In Minutes Calendar
    new:
      description: Number of calendar minutes between the time when the ticket was created and the time a Metabase employee first responded
  - field: reply_time_in_minutes_business
    current:
      description: null
      semantic_type: null
      display_name: Reply Time In Minutes Business
    new:
      description: Number of minutes between the time when the ticket was created and the time a Metabase employee first responded within Metabase's official business hours (8 AM - 5 PM PST)
  - field: first_resolution_time_in_minutes_calendar
    current:
      description: null
      semantic_type: null
      display_name: First Resolution Time In Minutes Calendar
    new:
      description: Number of calendar minutes between the time when the ticket was created and the time the ticket was first marked as resolved
  - field: first_resolution_time_in_minutes_business
    current:
      description: null
      semantic_type: null
      display_name: First Resolution Time In Minutes Business
    new:
      description: Number of minutes between the time when the ticket was created and the time the ticket was first marked as resolved within Metabase's official business hours (8 AM - 5 PM PST)
  - field: full_resolution_time_in_minutes_calendar
    current:
      description: null
      semantic_type: null
      display_name: Full Resolution Time In Minutes Calendar
