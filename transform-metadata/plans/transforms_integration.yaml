- table: metabot_usage_stats
  table_id: 1765
  dbt_model: metabot_usage_stats
  dbt_source: data_products/integration/schema.yml
  table_changes:
    description: This table will be used in customer.io to set up an automated email campaign to get customer feedback after 15 days post-activation of Metabot. The integration syncs the Metabot trial activation date, deployment, and plan_name for customers that activated the Metabot feature. **Caveats:** - Only the first account that is associated with the token usage are considered so we don't produce duplicate at the customer level.
  fields:
  - field: customer_name
    current:
      description: null
      semantic_type: null
      display_name: Customer Name
    new:
      description: The name of the customer
  - field: plan_name
    current:
      description: null
      semantic_type: null
      display_name: Plan Name
    new:
      description: The name of the plan the account is on
  - field: contact_name
    current:
      description: null
      semantic_type: null
      display_name: Contact Name
    new:
      description: The name of the contact person
  - field: contact_email
    current:
      description: null
      semantic_type: null
      display_name: Contact Email
    new:
      description: The email of the contact person
  - field: deployment
    current:
      description: null
      semantic_type: null
      display_name: Deployment
    new:
      description: The type of deployment (self-hosted or cloud)
  - field: total_tokens
    current:
      description: null
      semantic_type: null
      display_name: Total Tokens
    new:
      description: Total number of tokens used across all AI features
  - field: total_costs
    current:
      description: null
      semantic_type: null
      display_name: Total Costs
    new:
      description: Total estimated costs in USD for all token usage
  - field: first_usage_date
    current:
      description: null
      semantic_type: null
      display_name: First Usage Date
    new:
      description: The first date when Metabot was used
  - field: last_usage_date
    current:
      description: null
      semantic_type: null
      display_name: Last Usage Date
    new:
      description: The most recent date when Metabot was used
  - field: days_actively_using_metabot
    current:
      description: null
      semantic_type: null
      display_name: Days Actively Using Metabot
    new:
      description: Number of distinct days the customer actively used Metabot
  - field: first_activation_date
    current:
      description: null
      semantic_type: null
      display_name: First Activation Date
    new:
      description: The first date when the customer activated Metabot (from contract creation)
  - field: total_requests
    current:
      description: null
      semantic_type: null
      display_name: Total Requests
    new:
      description: Total number of unique requests made
  - field: days_since_last_usage
    current:
      description: null
      semantic_type: null
      display_name: Days Since Last Usage
    new:
      description: Number of days since the customer last used Metabot
