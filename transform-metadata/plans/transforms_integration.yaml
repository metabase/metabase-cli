schema: transforms_integration
tables:
- table: metabase_admins
  table_id: 1763
  dbt_model: metabase_admins
  dbt_source: data_products/integration/schema.yml
  table_changes:
    description: This model generates a list of all cloud and self-hosted admins for email campaigs. The model is synced to a Customer.io segment Metabase Admins, which is used to send email campaigns. **Caveats:** - We cannot know who the admins within self-hosted instances are, so we assume that the first user to sign up in the Metabase Store (i.e. the contact email on the account model) is the admin. **Granularity:** One row per email.
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: The unique identifier of the admin (based on the email address).
  - field: email
    current:
      description: null
      semantic_type: type/Email
      display_name: Email
    new:
      description: The email of the account admin.
  - field: first_name
    current:
      description: null
      semantic_type: type/Name
      display_name: First Name
    new:
      description: The first name of the account admin.
  - field: joined_at
    current:
      description: null
      semantic_type: type/JoinTimestamp
      display_name: Joined At
    new:
      description: The date when the admin joined the Metabase instance
  - field: canceled_at
    current:
      description: null
      semantic_type: type/CancelationTimestamp
      display_name: Canceled At
    new:
      description: The date when the account was/will be canceled.
  - field: trial_ended_at
    current:
      description: null
      semantic_type: null
      display_name: Trial Ended At
    new:
      description: The date when the account trial ended.
  - field: is_interactive_embedding_enabled
    current:
      description: null
      semantic_type: null
      display_name: Is Interactive Embedding Enabled
    new:
      description: Flag indicating if the interactive embedding feature is enabled for the account.
  - field: is_white_labeled
    current:
      description: null
      semantic_type: null
      display_name: Is White Labeled
    new:
      description: Flag indicating if the white labeling feature is enabled for the account.
  - field: is_token_activated
    current:
      description: null
      semantic_type: null
      display_name: Is Token Activated
    new:
      description: Flag indicating if the admin has activated their token (i.e. whether we already saw at least one token check).
  - field: is_air_gapped
    current:
      description: null
      semantic_type: null
      display_name: Is Air Gapped
    new:
      description: Indicates if the account is air-gapped and not connected to the internet, which means they are using a special air-gapped token that includes expiration, usage limits, and feature flags.
  - field: is_admin
    current:
      description: null
      semantic_type: null
      display_name: Is Admin
    new:
      description: Flag indicating if the user is an admin. This is always true for this list. It's not necessary, but just keeping it for consistency with the metabase_users_for_onboarding model. Note that for self-hosted instances, we assume the first user to sign up in the Metabase Store is the admin even though they may not have the admin role in the Metabase app.
  - field: subscription_status
    current:
      description: null
      semantic_type: type/Subscription
      display_name: Subscription Status
    new:
      description: The subscription status of the account.
  - field: plan_name
    current:
      description: null
      semantic_type: type/Category
      display_name: Plan Name
    new:
      description: The name of the plan the account is on.
  - field: primary_database
    current:
      description: null
      semantic_type: type/Category
      display_name: Primary Database
    new:
      description: The primary database of the account (e.g. postgres, redshift, snowflake, etc.). For cloud customers, it will have a value when there is a database connected to the instance. For self-hosted customers, we don't know so the value will be 'unknown'.
  - field: deployment
    current:
      description: null
      semantic_type: type/Category
      display_name: Deployment
    new:
      description: The type of deployment for the account (i.e. self-hosted or cloud).
  - field: customer_name
    current:
      description: null
      semantic_type: type/Category
      display_name: Customer Name
    new:
      description: The name of the customer.
  - field: dns_alias
    current:
      description: null
      semantic_type: null
      display_name: Dns Alias
    new:
      description: The DNS alias of the account. Only applicable for cloud instances.
  - field: instance_id
    current:
      description: null
      semantic_type: null
      display_name: Instance ID
    new:
      description: The instance ID of the account. Only applicable for cloud instances.
  - field: user_id
    current:
      description: null
      semantic_type: null
      display_name: User ID
    new:
      description: The user ID of the account. Only applicable for cloud instances. Note that a user_id is only unique within an instance (use the it together with the instance_id). As writing this, it is not used by the onboarding emails but we use it for some downstream analysis to understand user behavior changes after the email is sent.
  - field: customer_id
    current:
      description: null
      semantic_type: null
      display_name: Customer ID
    new:
      description: The customer ID of the account.
  - field: synced_at
    current:
      description: null
      semantic_type: null
      display_name: Synced At
    new:
      description: The date when the data was last synced. Used by scripts in the data-tool repo to remove outdated emails.
