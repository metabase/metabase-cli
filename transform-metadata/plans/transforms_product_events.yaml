- table: token_usage_event
  table_id: 1864
  dbt_model: token_usage_event
  dbt_source: data_products/product_events/schema.yml
  table_changes:
    description: 'This model contain the token usage information for LLM calls that happened in ai-service. Every LLM call in ai-service will create a new row in this table with the usage information. **What can this be used for*** This model was built to get an understanding of the LLM token usage of customers and can be used for that. Example questions it can answer: * How many tokens did customer X use in a specific time period? * Which features (using the `tag` as source) generated most usage (and costs) across customers? * What is the average response duration for LLM calls? * How many tokens does feature X (tag) use per request on average? * What is the average token consumption (+ costs) per user per time period? **Granularity:** One row per LLM call **Caveats**: * There can be multiple LLM calls within a single request (e.g. user chats with Metabot and Metabot performs multiple loops with tool calls where every LLM invocation would create a new event). However, you can aggregate
      those to a request level using the `request_id`. * LLM calls can be triggered by different sources (e.g. Metabot, Document generation, etc.). Use the `tag` column to identify which source / feature triggered the LLM call.'
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Surrogate key composed of the event's root_id and root_tstamp.
  - field: created_at
    current:
      description: null
      semantic_type: type/CreationTimestamp
      display_name: Created At
    new:
      description: Timestamp when the event occurred.
  - field: session_id
    current:
      description: null
      semantic_type: type/Category
      display_name: Session ID
    new:
      description: Session identifier that can be used to group request as part of the same conversation.
  - field: completion_tokens
    current:
      description: null
      semantic_type: null
      display_name: Completion Tokens
    new:
      description: The number of completion tokens.
  - field: estimated_costs_usd
    current:
      description: null
      semantic_type: type/Cost
      display_name: Estimated Costs Usd
    new:
      description: The estimated cost of for the tokens in USD.
  - field: hashed_metabase_license_token
    current:
      description: null
      semantic_type: null
      display_name: Hashed Metabase License Token
    new:
      description: The hashed value of the Metabase license token for instances with a token. For Open Source instances, this will use the snowplow anonymous uuid in the form `oss_<anonymous_uuid>` to allow unique counts of instances.
  - field: model_id
    current:
      description: null
      semantic_type: type/Category
      display_name: Model ID
    new:
      description: The ID of the model that was used to generate the tokens.
  - field: prompt_tokens
    current:
      description: null
      semantic_type: null
      display_name: Prompt Tokens
    new:
      description: The number of prompt tokens.
  - field: request_id
    current:
      description: null
      semantic_type: null
      display_name: Request ID
    new:
      description: Unique ID that is assigned to each incoming request. Can be used to aggregate usage for a single request.
  - field: total_tokens
    current:
      description: null
      semantic_type: null
      display_name: Total Tokens
    new:
      description: The total number of tokens.
  - field: duration_ms
    current:
      description: null
      semantic_type: type/Duration
      display_name: Duration Ms
    new:
      description: The time it took to (in milliseconds) to receive an answer from the LLM.
  - field: user_id
    current:
      description: null
      semantic_type: null
      display_name: User ID
    new:
      description: The ID of the user that send the request.
  - field: tag
    current:
      description: null
      semantic_type: type/Category
      display_name: Tag
    new:
      description: A classifier indicating the specific purpose or functionality for which the tokens were used.
  - field: profile
    current:
      description: null
      semantic_type: type/Category
      display_name: Profile
    new:
      description: The profile/configuration variant used for the request. Allows distinguishing different configuration variants and usage patterns. Introduced in schema version 1-0-4.
  - field: source
    current:
      description: null
      semantic_type: type/Source
      display_name: Source
    new:
      description: The source/trigger of the request (e.g., 'metabot_agent', 'sql_generation_workflow', 'analyze_chart'). Indicates which API endpoint or workflow initiated the LLM call. Introduced in schema version 1-0-4.
  - field: token
    current:
      description: null
      semantic_type: null
      display_name: Token
    new:
      description: The Metabase license token.
  - field: account_id
    current:
      description: null
      semantic_type: null
      display_name: Account ID
    new:
      description: The ID of the account that send the request.
  - field: instance_id
    current:
      description: null
      semantic_type: null
      display_name: Instance ID
    new:
      description: The ID of the instance that send the request.
  - field: customer_id
    current:
      description: null
      semantic_type: null
      display_name: Customer ID
    new:
      description: The ID of the cutomer that send the request.
