- table: usage_stats_anonymous_history
  table_id: 1868
  dbt_model: usage_stats_anonymous_history
  dbt_source: data_products/product_events/schema.yml
  table_changes:
    description: 'This table contains all received anonymized usage statistics from Metabase instances. Anonymized usage stats are only collected for instances that opted in to share usage statistics. The tracking originates from this code: https://github.com/metabase/metabase/blob/master/src/metabase/analytics/stats.clj **Caveats:** - The data only contains stats for instances that have opted in to share usage statistics. **Granularity:** 1 row per instance (that opted in to share usage statistics) per event sent (when stats where received)'
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Primary key
  - field: event_date
