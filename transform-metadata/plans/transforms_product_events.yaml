- table: monthly_instance_feature_stats
  table_id: 1856
  dbt_model: monthly_instance_feature_stats
  dbt_source: data_products/product_events/instance_features/schema.yml
  table_changes:
    description: 'The model aggregates key metrics related to the usage of features across Metabase instances on a monthly basis. It provides insights into the number of instances utilizing specific features, as well as their availability and enabled status. **Key use cases include:** - Use as denominator for calculating feature adoption rates or when comparing to related feature events - Evaluating feature utilization trends over time to inform product development. - Analyzing the availability and engagement of features among paying customers compared to free instances. **Granularity**: One row per feature per month ## Caveats: - The model only accounts for instances that have opted into sending anonymous stats, potentially leading to incomplete data for non-cloud instances. - Counts are based on unique (anonymous) instance identifiers - Feature availability was only implemented into the stats ping from Metabase version 51.0 onwards. ## Playbook: Example SQL queries demonstrating how to
      leverage this model. **Get monthly feature statistics for a specific feature:** ```sql select month, feature_name, all_instances, instances_with_feature_available, feature_available_rate from dbt_models_product_events.monthly_instance_feature_stats where feature_name = ''<feature_name>'' ```'
  fields:
  - field: month
    current:
      description: null
      semantic_type: null
      display_name: Month
    new:
      description: The month for which feature statistics are reported.
  - field: feature_name
    current:
      description: null
      semantic_type: null
      display_name: Feature Name
    new:
      description: The name of the feature being tracked.
  - field: all_instances
    current:
      description: null
      semantic_type: null
      display_name: All Instances
    new:
      description: The total number of unique instances that sent the stats ping.
  - field: instances_with_feature_available
    current:
      description: null
      semantic_type: null
      display_name: Instances With Feature Available
    new:
      description: The count of instances where the feature is available for use (i.e. can be enabled).
  - field: instances_with_feature_enabled
    current:
      description: null
      semantic_type: null
      display_name: Instances With Feature Enabled
    new:
      description: The count of instances where the feature is actively enabled (i.e. it can be used).
  - field: feature_available_rate
    current:
      description: null
      semantic_type: null
      display_name: Feature Available Rate
    new:
      description: The percentage of instances where the feature is available.
  - field: feature_enabled_rate
    current:
      description: null
      semantic_type: null
      display_name: Feature Enabled Rate
    new:
      description: The percentage of instances with the feature available where the feature is enabled (i.e. it can be used).
  - field: paying_instances
    current:
      description: null
      semantic_type: null
      display_name: Paying Instances
    new:
      description: The count of paying instances that sent the stats ping.
  - field: paying_instances_with_feature_available
    current:
