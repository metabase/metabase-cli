- table: daily_instance_feature_availability
  table_id: 1841
  dbt_model: daily_instance_feature_availability
  dbt_source: data_products/product_events/instance_features/schema.yml
  table_changes:
    description: 'The model provides insights into the availability and status of features across Metabase instances on a daily basis. The data is based on the anonymous stats ping we receive from Metabase instances. **Key use cases include:** - Feature adoption: Understanding which features are most commonly enabled and available across instances. - Analyzing trends in feature availability over time to inform product development and marketing strategies. **Granularity:** One row per feature per instance per day ## Caveats: - This data only shows instances that opted into sending anonymous stats pings (cloud instances have opt-in by default). - We can only identify cloud instances with their `account_id`. The identifcation might not work right away due to potential delays in the ETL process, which may affect data completeness for new instances. - Feature availability was only implemented into the stats ping from Metabase version 51.0 onwards. ## Playbook: Example SQL queries demonstrating
      how to leverage this model. **Get the feature availability for a specific instance:** ```sql select metabase_instance_id, feature_name, is_available, is_enabled from dbt_models_product_events.daily_instance_feature_availability where metabase_instance_id = ''<your_instance_id>'' and date = ''<specific_date>'' ``` **Retrieve the features available for all paying instances:** ```sql select metabase_instance_id, feature_name, is_available, metabase_plan from dbt_models_product_events.daily_instance_feature_availability where is_paying_instance = true ```'
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Unique identifier for the feature availability record.
  - field: date
    current:
      description: null
      semantic_type: null
      display_name: Date
    new:
      description: The date for which feature availability is reported.
  - field: feature_name
    current:
      description: null
      semantic_type: null
      display_name: Feature Name
    new:
      description: The name of the feature being tracked.
  - field: is_available
    current:
      description: null
      semantic_type: null
      display_name: Is Available
    new:
      description: Indicates if the feature is available for the instance (i.e. can it be enabled).
  - field: is_enabled
    current:
      description: null
      semantic_type: null
      display_name: Is Enabled
    new:
      description: Indicates if the feature is enabled for the instance (i.e. it can be used).
  - field: is_paying_instance
    current:
      description: null
      semantic_type: null
      display_name: Is Paying Instance
    new:
      description: Indicates if the instance is on a paid Metabase plan.
  - field: metabase_plan
    current:
      description: null
      semantic_type: null
      display_name: Metabase Plan
    new:
      description: The Metabase plan associated with the instance.
  - field: instance_dns
    current:
      description: null
      semantic_type: null
      display_name: Instance Dns
    new:
      description: 'The DNS name of the Metabase instance. Note: This is only available for cloud instances if we could match the instance to an account.'
  - field: metabase_anonymous_instance_id
    current:
      description: null
      semantic_type: null
      display_name: Metabase Anonymous Instance ID
    new:
      description: The anonymous ID of the Metabase instance.
  - field: account_id
    current:
      description: null
      semantic_type: null
      display_name: Account ID
    new:
      description: 'The account ID associated with the instance. Note: This is only available for cloud instances if we could match the instance to an account.'
  - field: unified_instance_event_id
    current:
      description: null
      semantic_type: null
      display_name: Unified Instance Event ID
    new:
      description: The ID of the unified instance event.
  - field: metabase_version_id
    current:
      description: null
      semantic_type: null
      display_name: Metabase Version ID
    new:
      description: The version of Metabase being used.
- table: daily_instance_feature_stats
  table_id: 1842
  dbt_model: daily_instance_feature_stats
  dbt_source: data_products/product_events/instance_features/schema.yml
  table_changes:
    description: 'The model aggregates key metrics related to the usage of features across Metabase instances on a daily basis. It provides insights into the number of instances utilizing specific features, as well as their availability and enabled status. **Key use cases include:** - Use as denominator for calculating feature adoption rates or when comparing to related feature events - Evaluating feature utilization trends over time to inform product development. - Analyzing the availability and engagement of features among paying customers compared to free instances. **Granularity:** One row per feature per day ## Caveats: - The model only accounts for instances that have opted into sending anonymous stats, potentially leading to incomplete data for non-cloud instances. - Counts are based on unique (anonymous) instance identifiers - Feature availability was only implemented into the stats ping from Metabase version 51.0 onwards. ## Playbook: Example SQL queries demonstrating how to leverage
      this model. **Get daily feature statistics for a specific feature:** ```sql select date, feature_name, all_instances, instances_with_feature_available, feature_available_rate from dbt_models_product_events.daily_instance_feature_stats where feature_name = ''<feature_name>'' ```'
  fields:
  - field: date
    current:
      description: null
      semantic_type: null
      display_name: Date
    new:
      description: The date for which feature statistics are reported.
  - field: feature_name
    current:
      description: null
      semantic_type: null
      display_name: Feature Name
    new:
      description: The name of the feature being tracked.
  - field: all_instances
    current:
      description: null
      semantic_type: null
      display_name: All Instances
    new:
      description: The total number of unique instances that sent the stats ping.
  - field: instances_with_feature_available
    current:
      description: null
      semantic_type: null
      display_name: Instances With Feature Available
    new:
      description: The count of instances where the feature is available for use (i.e. can be enabled).
  - field: instances_with_feature_enabled
    current:
      description: null
      semantic_type: null
      display_name: Instances With Feature Enabled
    new:
      description: The count of instances where the feature is actively enabled (i.e. it can be used).
  - field: feature_available_rate
    current:
      description: null
      semantic_type: null
      display_name: Feature Available Rate
    new:
      description: The percentage of instances where the feature is available.
  - field: feature_enabled_rate
    current:
      description: null
      semantic_type: null
      display_name: Feature Enabled Rate
    new:
      description: The percentage of instances with the feature available where the feature is enabled (i.e. it can be used).
  - field: paying_instances
    current:
      description: null
      semantic_type: null
      display_name: Paying Instances
    new:
      description: The count of paying instances that sent the stats ping.
  - field: paying_instances_with_feature_available
    current:
      description: null
      semantic_type: null
      display_name: Paying Instances With Feature Available
    new:
      description: The count of paying instances where the feature is available for use (i.e. can be enabled).
  - field: paying_instances_with_feature_enabled
    current:
      description: null
      semantic_type: null
      display_name: Paying Instances With Feature Enabled
    new:
      description: The count of paying instances where the feature is actively enabled (i.e. it can be used).
  - field: paying_feature_available_rate
    current:
      description: null
      semantic_type: null
      display_name: Paying Feature Available Rate
    new:
      description: The percentage of paying instances where the feature is available.
  - field: paying_feature_enabled_rate
    current:
      description: null
      semantic_type: null
      display_name: Paying Feature Enabled Rate
    new:
      description: The percentage of paying instances with the feature available where the feature is enabled (i.e. it can be used).
- table: daily_instance_metrics
  table_id: 1843
  dbt_model: daily_instance_metrics
  dbt_source: data_products/product_events/schema.yml
  table_changes:
    description: 'This model provides the daily metrics collected by anonymous stats pings received from Metabase instances. **Key use cases include:** - **Performance Monitoring:** Track key performance indicators (KPIs) to ensure instances are running optimally. - **Feature Usage Analysis:** Understand how different features are being utilized across instances to inform product development and enhancements. - **Trend Analysis:** Identify trends in metric values over time to detect potential issues or areas for improvement. - **Segment Analysis:** Compare metrics across different plans **Granularity:** One row per metric (per group) per instance per day. ## Caveats: - **Data Completeness:** This data only shows instances that opted into sending anonymous stats pings (cloud instances have opt-in by default). - **ETL Delays:** We can only identify cloud instances with their `account_id`. The identifcation might not work right away due to potential delays in the ETL process, which may affect
      data completeness for new instances. - **Metric Availability:** Only metrics tracked by Metabase version 51.0 and later are included. - **Metric groups:** Some metrics are grouped into categories. Those will have a `metric_group` value. For individual metrics, this field will be `null`. ## Playbook: Example SQL queries demonstrating how to leverage this model. **Retrieve metrics for a specific instance on a specific date:** ```sql select metabase_anonymous_instance_id, metric_name, metric_group, value, is_paying_instance, metabase_plan from dbt_models_product_events.daily_instance_metrics where metabase_anonymous_instance_id = ''<your_instance_id>'' and date = ''2024-12-05'' ``` **Analyze average metric values for all paying instances:** ```sql select metric_name, avg(value) as average_value from dbt_models_product_events.daily_instance_metrics where is_paying_instance = true group by metric_name order by average_value desc ``` **Track metric trends over the past month for a specific
      metric:** ```sql select date, value from dbt_models_product_events.daily_instance_metrics where metric_name = ''query_execution_time'' and date >= current_date - interval ''30 day'' order by date ``` **Analyze a grouped metric**: ```sql select metric_group, metric_name, avg(value) as average_value from dbt_models_product_events.daily_instance_metrics where metric_group = ''query_execution'' group by metric_group, metric_name order by average_value desc ```'
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Unique identifier for the metric record.
  - field: date
    current:
      description: null
      semantic_type: null
      display_name: Date
    new:
      description: The date for which the metric is reported.
  - field: metric_name
    current:
      description: null
      semantic_type: null
      display_name: Metric Name
    new:
      description: The name of the metric being tracked.
  - field: metric_group
    current:
      description: null
      semantic_type: null
      display_name: Metric Group
    new:
      description: The group or category to which the metric belongs. This is only important for grouped metrics.
  - field: value
    current:
      description: null
      semantic_type: null
      display_name: Value
    new:
      description: The numerical value of the metric.
  - field: is_paying_instance
    current:
      description: null
      semantic_type: null
      display_name: Is Paying Instance
