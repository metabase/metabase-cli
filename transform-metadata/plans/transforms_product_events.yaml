- table: data_complexity_event
  table_id: 1846
  dbt_model: data_complexity_event
  dbt_source: data_products/product_events/schema.yml
  table_changes:
    description: 'Data Complexity Score events from Metabase instances. The Data Complexity Score is computed per instance from a hierarchical formula across multiple catalogs (`library`, `universe`, `metabot`). Each catalog is composed of `<group>` rollups that aggregate `<group>.<component>` leaves into a single weighted score. **Granularity:** One row per (catalog, key) slice per instance per scoring run. A single scoring run on an instance emits multiple rows: one for the catalog `total`, one per `<group>.total` rollup, and one per `<group>.<component>` leaf. **What can this be used for:** * Tracking the complexity score distribution across instances and over time * Drilling into which components drive a customer''s overall complexity * Comparing scoring formula versions when the formula changes * Identifying instances that fail to compute specific sub-scores (see `error`) **Caveats:** * `score` is null when the leaf''s measurement couldn''t be computed, or when an aggregate rollup includes
      any uncomputed leaf — check `error` (only set on the originating leaf) to see why. * `measurement` is absent on aggregate rows (`*.total` and the catalog `total`) and null on uncomputed leaves. * When comparing scores across time, filter by `formula_version` — values are not directly comparable across formula versions. * `parameters` is a free-form JSON object holding scoring inputs that are likely to evolve (tunables, embedder identity). Sorted-key serialization means it''s safe to use as a SQL group-by.'
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Surrogate key composed of the event's root_id and root_tstamp.
  - field: event_name
    current:
      description: null
      semantic_type: null
      display_name: Event Name
    new:
      description: Name of the event (always `data_complexity_scoring`).
  - field: created_at
    current:
      description: null
      semantic_type: null
      display_name: Created At
    new:
      description: Timestamp of when the event was created.
  - field: collected_at
    current:
      description: null
      semantic_type: null
      display_name: Collected At
    new:
      description: Timestamp of when the event was collected.
  - field: catalog
    current:
      description: null
      semantic_type: null
      display_name: Catalog
    new:
      description: Which catalog of the data layer was scored — one of `library`, `universe`, `metabot`.
  - field: score_key
    current:
      description: null
      semantic_type: null
      display_name: Score Key
    new:
      description: 'Dotted identifier for this slice: `total` for the catalog rollup, `<group>.total` for a group rollup, or `<group>.<component>` for a leaf. Free-form so new keys can be added without a schema bump.'
  - field: score
    current:
      description: null
      semantic_type: null
      display_name: Score
    new:
      description: Weighted score for this key. Null when the sub-score (or any sub-score it aggregates) couldn't be computed.
  - field: measurement
    current:
      description: null
      semantic_type: null
      display_name: Measurement
    new:
      description: Raw pre-score measurement. Absent on aggregate rows; null on uncomputed leaves.
  - field: error
    current:
      description: null
      semantic_type: null
      display_name: Error
    new:
      description: Failure message on the originating leaf when its sub-score couldn't be computed. Aggregates carry null `score` rather than propagating the error.
  - field: formula_version
    current:
      description: null
      semantic_type: null
      display_name: Formula Version
    new:
      description: Scoring formula version. Bumps on breaking changes — filter on this when comparing scores across time.
  - field: parameters
    current:
      description: null
      semantic_type: null
      display_name: Parameters
    new:
      description: JSON object with scoring inputs that are likely to evolve (tunables, embedder identity). Sorted-key serialized so it's stable for SQL group-by.
  - field: batch_id
    current:
      description: null
      semantic_type: null
      display_name: Batch ID
    new:
      description: UUID identifying the scoring run that emitted this row. All (catalog, key) slices from a single scoring pass on one instance share a `batch_id`, letting you reconstruct the full set of scores published together. Generated once per scoring run on the source instance and emitted with every event in that run.
  - field: batch_started_at
    current:
      description: null
      semantic_type: null
      display_name: Batch Started At
    new:
      description: Timestamp of the earliest event in this batch (`min(created_at)` over all rows sharing this `batch_id`). Use this as the canonical "when did this scoring run happen" timestamp instead of `created_at`, which varies per row within a batch.
  - field: metabase_version
    current:
      description: null
      semantic_type: null
      display_name: Metabase Version
    new:
      description: Metabase instance version tag.
  - field: instance_dns
    current:
      description: null
      semantic_type: null
      display_name: Instance Dns
    new:
      description: DNS of the Metabase instance.
  - field: metabase_instance_id
    current:
      description: null
      semantic_type: null
      display_name: Metabase Instance ID
    new:
      description: Anonymous UUID of the Metabase instance.
  - field: account_id
    current:
      description: null
      semantic_type: null
      display_name: Account ID
    new:
      description: ID of the Metabase account. Only available for cloud instances.
  - field: metabase_user_id
    current:
      description: null
      semantic_type: null
      display_name: Metabase User ID
    new:
      description: Surrogate key composed of the Metabase application's instance and user ID.
  - field: unified_instance_event_id
