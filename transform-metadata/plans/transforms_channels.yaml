  - field: is_existing_active_customer
    current:
      description: null
      semantic_type: null
      display_name: Is Existing Active Customer
    new:
      description: Indicates whether customer had an active account on the date of registration
      display_name: Is Existing Active Customer (On Registration)
  - field: is_new_customer
    current:
      description: null
      semantic_type: null
      display_name: Is New Customer
    new:
      description: Indicates whether they created the account after they registered for the webinar
      display_name: Is New Customer (After Registration)
  - field: is_customer_currently_active
    current:
      description: null
      semantic_type: null
      display_name: Is Customer Currently Active
    new:
      description: Indicates whether the customer is currently active
  - field: plan_name
    current:
      description: null
      semantic_type: null
      display_name: Plan Name
    new:
      description: Metabase plan name
  - field: account_created_at
    current:
      description: null
      semantic_type: type/CreationTimestamp
      display_name: Account Created At
    new:
      description: Timestamp the registrant's account was created
  - field: days_before_conversion
    current:
      description: null
      semantic_type: null
      display_name: Days Before Conversion
    new:
      description: Number of days laspsed since the event date until account created date for participating registrants who are new accounts. If value is negative, the account was created between date of registration and event
  - field: title
    current:
      description: null
      semantic_type: type/Title
