    new:
      description: Registrant organization's industry from Apollo enriched contact
  - field: organization_employees
    current:
      description: null
      semantic_type: null
      display_name: Organization Employees
    new:
      description: Registrant organization's estimated employee count from Apollo enriched contact
  - field: organization_size
    current:
      description: null
      semantic_type: type/Category
      display_name: Organization Size
    new:
      description: Registrant organization's employee count custom grouping
  - field: account_id
    current:
      description: null
      semantic_type: null
      display_name: Account ID
    new:
      description: Foreign key to Account model
  - field: current_customer_id
    current:
      description: null
      semantic_type: null
      display_name: Current Customer ID
    new:
      description: Foreign key to Customer model
  - field: webinar_session_id
    current:
      description: null
      semantic_type: null
      display_name: Webinar Session ID
    new:
      description: foreign key of the Webinar Session model
- table: webinar_session
  table_id: 1660
  dbt_model: webinar_session
