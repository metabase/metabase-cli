  - field: live_completion_rate
    current:
      description: null
      semantic_type: type/Share
      display_name: Live Completion Rate
    new:
      description: Rate of completion of the live webinar session
      semantic_type: type/Percentage
  - field: has_viewed_replay
    current:
      description: null
      semantic_type: null
      display_name: Has Viewed Replay
    new:
      description: Indicates whether the registrant viewed the replay of the webinar and watched at least 50% of the replay
  - field: replay_completion_rate
    current:
      description: null
      semantic_type: type/Share
      display_name: Replay Completion Rate
