- table: ms_contract
  table_id: 1798
  dbt_model: ms_contract
  dbt_source: data_products/metabase_store/schema.yml
  table_changes:
    description: Contract info, currently only Enterprise customers have contracts.
    display_name: MS Contract
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Primary key of the contract.
  - field: contract_number
    current:
      description: null
      semantic_type: null
      display_name: Contract Number
    new:
      description: Actual contract number, generally in the format of `XXXXX-YY`, where XXXXX is the Metabase Store organization ID, and YY is the number of contracts.
  - field: organization_name
    current:
      description: null
      semantic_type: null
      display_name: Organization Name
    new:
      description: Name of the Metabase Store organization
  - field: booked_at
    current:
      description: null
      semantic_type: null
      display_name: Booked At
    new:
      description: Date when the contract was booked
  - field: annual_value
    current:
      description: null
      semantic_type: null
      display_name: Annual Value
    new:
      description: Annual contract value in dollars.
  - field: is_auto_renewal
    current:
      description: null
      semantic_type: null
      display_name: Is Auto Renewal
    new:
      description: Indicates if the contract is set to auto-renew.
  - field: status
    current:
      description: null
      semantic_type: type/Category
      display_name: Status
    new:
      description: Contract status, with possible values of "active" or "cancelled" (which means expired).
  - field: novelty
    current:
      description: null
      semantic_type: type/Category
      display_name: Novelty
    new:
      description: 'Reason why a new contract was created. Possible values and definitions below. new: A new Enterprise customer, and this is their first contract upgrade: Customer upgrade from one Enterprise tier to another,e.g. basic to advanced. contract term update: The contract term needed to be updated from the previous contract, leading to a new one. expansion: Customer expanded their commitment, incurred a higher ARR from the previous contract.'
  - field: cancelled_reason
    current:
      description: null
      semantic_type: type/Category
      display_name: Cancelled Reason
    new:
      description: 'Reason why the contract was cancelled or expired, only populated when status = "cancelled". Possible values and definitions below. churn: No new contract or subscription followed the current contract. upgrade: Customer upgraded to a higher tier within Enterprise. contract term update: Contract term needed to be updated, thus the existing one was cancelled. downgrade: Customer downgraded from Enterprise to either Pro or Starter plan.'
  - field: product_type
    current:
      description: null
      semantic_type: type/Category
      display_name: Product Type
    new:
      description: Product type, e.g. "enterprise" , "embedding"
  - field: product_tier
    current:
      description: null
      semantic_type: type/Category
      display_name: Product Tier
    new:
      description: Product tier, e.g. "basic", "standard", "advanced"
  - field: support_tier
    current:
      description: null
      semantic_type: type/Category
      display_name: Support Tier
    new:
      description: Support tier, e.g. "standard", "priority"
  - field: harbormaster_url
    current:
      description: null
      semantic_type: type/URL
      display_name: Harbormaster URL
    new:
      description: Link to the contract in Harbormater tools. In the format of "https://tools.metabase.com/contracts/[contract_id]"
  - field: contract_file_url
    current:
      description: null
      semantic_type: type/URL
      display_name: Contract File URL
    new:
      description: Link to the actual contract PDF stored in AWS. In the format of "https://metabase-harbormaster-data-prod.s3.us-east-1.amazonaws.com/contracts/[org_id]/[contract_id].pdf"
  - field: base_fee
    current:
      description: null
      semantic_type: null
      display_name: Base Fee
    new:
      description: Base fee for the contract
  - field: total_units
    current:
      description: null
      semantic_type: null
      display_name: Total Units
    new:
      description: Current number of units provisioned under the contract for product 1, i.e. included_units + prepaid_units
  - field: included_units
    current:
      description: null
      semantic_type: null
      display_name: Included Units
    new:
      description: Number of units already included in the base plan for product 1, also called 'cap quantity.'
  - field: variable_unit
    current:
      description: null
      semantic_type: type/Category
      display_name: Variable Unit
    new:
      description: Unit of measure for the product 1(e.g., users, accounts, servers, or installations).
  - field: price_per_unit
    current:
      description: null
      semantic_type: null
      display_name: Price Per Unit
    new:
      description: Price for each unit for product 1
  - field: prepaid_units
    current:
      description: null
      semantic_type: null
      display_name: Prepaid Units
    new:
      description: Number of units that have been pre-paid for product 1
  - field: store_organization_id
    current:
      description: null
      semantic_type: null
      display_name: Store Organization ID
    new:
      description: Foreign key to the Organization model.
  - field: store_subscription_id
    current:
      description: null
      semantic_type: type/Subscription
      display_name: Store Subscription ID
    new:
      description: Foreign key to the Subscriptions model.
  - field: stripe_customer_id
    current:
      description: null
      semantic_type: null
      display_name: Stripe Customer ID
    new:
      description: Foreign key to the Stripe Customer model.
  - field: stripe_subscription_id
    current:
      description: null
      semantic_type: type/Subscription
      display_name: Stripe Subscription ID
    new:
      description: Foreign key to the Stripe Subscriptions model.
  - field: customer_id
    current:
      description: null
      semantic_type: null
      display_name: Customer ID
    new:
      description: Foreign key to the Customer model.
  - field: new_organization_id
    current:
      description: null
      semantic_type: null
      display_name: New Organization ID
    new:
      description: Foreign key to the organization model. Points to the new organization if the organization was migrated to a new organization (e.g. on merging).
  - field: source
    current:
      description: null
      semantic_type: type/Source
      display_name: Source
    new:
      description: ingestion source, either harbormaster or legacy revenue gsheet.
  - field: salesforce_opportunity_id
    current:
      description: null
      semantic_type: type/Category
      display_name: Salesforce Opportunity ID
    new:
      description: Salesforce Opportunity ID
