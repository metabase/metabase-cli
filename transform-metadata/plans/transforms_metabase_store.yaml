- table: ms_hosted_instance_quota_usage
  table_id: 1809
  dbt_model: ms_hosted_instance_quota_usage
  dbt_source: data_products/metabase_store/schema.yml
  table_changes:
    description: '**Purpose and Utility**: The table tracks the usage of quotas for various hosting features within the platform. It is designed to answer key questions such as: - How much of a particular resource is currently being used by hosted instances? - What are the thresholds for alerting users about approaching or exceeding usage limits? - Which instances are locked due to quota overages? This data supports use cases such as monitoring resource usage, managing hosting capacities, and ensuring that instances operate within their allotted quotas. **Granularity**: One row per instance per hosting feature **Update Frequency**: Every 2 hours'
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Unique identifier for each record in the table. This ID is a UUID that ensures each entry is distinct.
  - field: created_at
    current:
      description: null
      semantic_type: null
      display_name: Created At
    new:
      description: Timestamp indicating when the quota usage record was first created.
  - field: updated_at
    current:
      description: null
      semantic_type: null
      display_name: Updated At
    new:
      description: Timestamp indicating the last time the record was updated. This can be used to track changes in quota usage over time.
  - field: deleted_at
    current:
      description: null
      semantic_type: null
      display_name: Deleted At
    new:
      description: Timestamp indicating when the record was marked as deleted (soft delete). Records with this field populated are no longer active but are retained for historical analysis.
  - field: hosting_feature
    current:
      description: null
      semantic_type: type/Category
      display_name: Hosting Feature
    new:
      description: Describes the specific hosting feature being tracked (e.g., clickhouse-dwh). This field helps in identifying which resource's usage is being monitored.
  - field: quota_type
    current:
      description: null
      semantic_type: type/Category
      display_name: Quota Type
    new:
      description: Indicates the type of quota applied to the hosting feature, such as number of rows for the data warehouse feature.
  - field: usage
    current:
      description: null
      semantic_type: null
      display_name: Usage
    new:
      description: Represents the current usage of the hosting feature by the instance. The unit of measurement varies depending on the hosting feature and quota_type.
  - field: next_alert_threshold
    current:
      description: null
      semantic_type: null
      display_name: Next Alert Threshold
    new:
      description: The usage level at which the next alert will be triggered for the hosted instance.
  - field: locked
    current:
      description: null
      semantic_type: null
      display_name: Locked
    new:
      description: A boolean field that indicates whether the hosted instance is locked due to exceeding its quota.
  - field: hosted_instance_id
    current:
      description: null
      semantic_type: null
      display_name: Hosted Instance ID
    new:
      description: A unique identifier for the hosted instance associated with the quota usage. This ID links the quota usage data to a specific instance.
