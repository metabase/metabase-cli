  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Primary key for the Lead table and or model. This is equal to the pipedrive lead id
  - field: title
    current:
      description: null
      semantic_type: type/Title
      display_name: Title
    new:
      description: Title for the lead as written in pipedrive
  - field: organization_name
    current:
      description: null
      semantic_type: null
      display_name: Organization Name
    new:
      description: Organization name for the lead
  - field: organization_size
    current:
      description: null
      semantic_type: type/Category
      display_name: Organization Size
    new:
      description: Organization size if available in pipedrive
  - field: status
    current:
      description: null
      semantic_type: type/Category
      display_name: Status
    new:
      description: Label for the staus of the lead, potential values include converted, pending and archived
  - field: label_name
    current:
      description: null
      semantic_type: type/Category
