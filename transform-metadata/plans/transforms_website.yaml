- table: website_session_intent
  table_id: 2048
  dbt_model: website_session_intent
  dbt_source: data_products/website/schema.yml
  table_changes:
    description: A detailed summary of user session intent based on various website interactions. **Granularity:** One row per session.
  fields:
  - field: session_id
    current:
      description: null
      semantic_type: null
      display_name: Session ID
    new:
      description: The unique identifier of the session.
      semantic_type: type/PK
  - field: user_snowplow_crossdomain_id
    current:
      description: null
      semantic_type: null
      display_name: User Snowplow Crossdomain ID
    new:
      description: Cross-domain user ID from Snowplow tracking.
  - field: session_start_at
    current:
      description: null
      semantic_type: null
      display_name: Session Start At
    new:
      description: The start timestamp of the user session.
      semantic_type: type/CreationTimestamp
  - field: country
    current:
      description: null
      semantic_type: null
      display_name: Country
    new:
      description: The country from which the user accessed the site.
      semantic_type: type/Country
  - field: is_top_5_country
    current:
      description: null
      semantic_type: null
      display_name: Is Top 5 Country
    new:
      description: Indicator if the user's country is one of the top 5 countries in terms of traffic.
      semantic_type: type/Category
  - field: marketing_source
    current:
      description: null
      semantic_type: null
      display_name: Marketing Source
    new:
      description: The source of the marketing campaign, if applicable.
      semantic_type: type/Category
  - field: marketing_medium
    current:
      description: null
      semantic_type: null
      display_name: Marketing Medium
    new:
      description: The medium of the marketing campaign, if applicable.
      semantic_type: type/Category
  - field: marketing_campaign
    current:
      description: null
      semantic_type: null
      display_name: Marketing Campaign
    new:
      description: The name of the marketing campaign, if applicable.
      semantic_type: type/Category
  - field: referer_medium
    current:
      description: null
      semantic_type: null
      display_name: Referer Medium
    new:
      description: The medium of the referral source.
      semantic_type: type/Category
  - field: referer_source
    current:
      description: null
      semantic_type: null
      display_name: Referer Source
    new:
      description: The source of the referral.
      semantic_type: type/Category
  - field: referer_url
    current:
      description: null
      semantic_type: null
      display_name: Referer URL
    new:
      description: Previous page URL before the current session.
  - field: session_first_page_url
    current:
      description: null
      semantic_type: null
      display_name: Session First Page URL
    new:
      description: The URL of the first page the user visited in the session.
  - field: is_traffic_qualified
    current:
      description: null
      semantic_type: null
      display_name: Is Traffic Qualified
    new:
      description: Indicator whether the traffic is qualified (i.e. from specific countries)
      semantic_type: type/Category
  - field: is_visitor
    current:
      description: null
      semantic_type: null
      display_name: Is Visitor
    new:
      description: Indicator that the user is a visitor (always true).
      semantic_type: type/Category
  - field: is_reading
    current:
      description: null
      semantic_type: null
      display_name: Is Reading
    new:
      description: Indicator if the user's session involved reading blog, community stories, or learning resources.
      semantic_type: type/Category
  - field: is_browsing
    current:
      description: null
      semantic_type: null
      display_name: Is Browsing
    new:
      description: Indicator if the user's session involved browsing product-related pages without specific intent to purchase or download.
      semantic_type: type/Category
  - field: is_shopping
    current:
      description: null
      semantic_type: null
      display_name: Is Shopping
    new:
      description: Indicator if the user's session involved activities related to shopping or purchasing.
      semantic_type: type/Category
  - field: is_trying
    current:
      description: null
      semantic_type: null
      display_name: Is Trying
    new:
      description: Indicator if the user's session involved trying or downloading the product.
      semantic_type: type/Category
  - field: is_shopping_selfservice
    current:
      description: null
      semantic_type: null
      display_name: Is Shopping Selfservice
    new:
      description: Indicator if the user's session involved shopping through a self-service portal.
      semantic_type: type/Category
  - field: is_trying_oss
    current:
      description: null
      semantic_type: null
      display_name: Is Trying Oss
    new:
      description: Indicator if the user's session involved actions related to trying or downloading the open-source software.
      semantic_type: type/Category
  - field: is_trialing_selfservice
    current:
      description: null
      semantic_type: null
      display_name: Is Trialing Selfservice
    new:
      description: Indicator if the user's session resulted in starting a trial through the self-service checkout.
      semantic_type: type/Category
  - field: is_trialing_enterprise
    current:
      description: null
      semantic_type: null
      display_name: Is Trialing Enterprise
    new:
      description: Indicator if the user's session involved starting an enterprise trial or submitting a contact form for enterprise edition.
      semantic_type: type/Category
