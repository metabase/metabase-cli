schema: transforms_stripe
tables:
- table: stripe_charge
  table_id: 2028
  dbt_model: stripe_charge
  dbt_source: data_products/stripe/schema.yml
  table_changes:
    description: Charges made to a credit or a debit card to pay invoices. Read more at https://stripe.com/docs/api/charges/object
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Primary key
  - field: created_at
    current:
      description: null
      semantic_type: type/CreationTimestamp
      display_name: Created At
    new:
      description: Timestamp for when the charge was created
  - field: is_paid
    current:
      description: null
      semantic_type: null
      display_name: Is Paid
    new:
      description: True if the charge succeeded, or was successfully authorized for later capture.
  - field: is_refunded
    current:
      description: null
      semantic_type: null
      display_name: Is Refunded
    new:
      description: Whether the charge has been fully refunded. If the charge is only partially refunded, this attribute will still be false.
  - field: is_captured
    current:
      description: null
      semantic_type: null
      display_name: Is Captured
    new:
      description: If the charge was created without capturing, this represents whether it is still uncaptured or has since been captured.
  - field: status
    current:
      description: null
      semantic_type: type/Category
      display_name: Status
    new:
      description: The status of the payment is either succeeded, pending, or failed.
  - field: outcome_type
    current:
      description: null
      semantic_type: type/Category
      display_name: Outcome Type
    new:
      description: Possible values are authorized, manual_review, issuer_declined, blocked, and invalid.
  - field: outcome_status
    current:
      description: null
      semantic_type: type/Category
      display_name: Outcome Status
    new:
      description: Possible values are approved_by_network, declined_by_network, not_sent_to_network, and reversed_after_approval. The value reversed_after_approval indicates the payment was blocked by Stripe after bank authorization, and may temporarily appear as "pending" on a cardholder’s statement.
  - field: outcome_reason
    current:
      description: null
      semantic_type: type/Category
      display_name: Outcome Reason
    new:
      description: An enumerated value providing a more detailed explanation of the outcome’s type.
  - field: outcome_risk_level
    current:
      description: null
      semantic_type: type/Category
      display_name: Outcome Risk Level
    new:
      description: Stripe Radar’s evaluation of the riskiness of the payment. Possible values for evaluated payments are normal, elevated, highest. For non-card payments, and card-based payments predating the public assignment of risk levels, this field will have the value not_assessed.
  - field: outcome_message
    current:
      description: null
      semantic_type: type/Category
      display_name: Outcome Message
    new:
      description: A human-readable description of the outcome type and reason, designed for you (the recipient of the payment), not your customer.
  - field: failure_code
    current:
      description: null
      semantic_type: type/Category
      display_name: Failure Code
    new:
      description: Error code explaining reason for charge failure if available.
  - field: failure_message
    current:
      description: null
      semantic_type: type/Category
      display_name: Failure Message
    new:
      description: Message to user further explaining reason for charge failure if available.
  - field: receipt_email
    current:
      description: null
      semantic_type: type/Email
      display_name: Receipt Email
    new:
      description: This is the email address that the receipt for this charge was sent to.
  - field: country
    current:
      description: null
      semantic_type: type/Country
      display_name: Country
    new:
      description: The country of the credit/debit card used for the charge
  - field: amount
    current:
      description: null
      semantic_type: null
      display_name: Amount
    new:
      description: Amount intended to be collected by this payment in dollars.
  - field: amount_refunded
    current:
      description: null
      semantic_type: null
      display_name: Amount Refunded
    new:
      description: Amount in dollars refunded (can be less than the amount on the charge if a partial refund was issued).
  - field: customer_name
    current:
      description: null
      semantic_type: null
      display_name: Customer Name
    new:
      description: Name of the customer
  - field: stripe_customer_id
    current:
      description: null
      semantic_type: null
      display_name: Stripe Customer ID
    new:
      description: Foreign key to Stripe Customer model
  - field: invoice_id
    current:
      description: null
      semantic_type: null
      display_name: Invoice ID
    new:
      description: Foreign key to Stripe Invoice model
- table: stripe_credit_note
  table_id: 2029
  dbt_model: stripe_credit_note
  dbt_source: data_products/stripe/schema.yml
  table_changes:
    description: Credit note to adjust an invoice's amount after the invoice is finalized. Read more at https://stripe.com/docs/api/credit_notes
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Primary key
  - field: customer_name
    current:
      description: null
      semantic_type: type/Category
      display_name: Customer Name
    new:
      description: Customer's name
  - field: reference_number
    current:
      description: null
      semantic_type: null
      display_name: Reference Number
    new:
      description: A unique number that identifies this particular credit note and appears on the PDF of the credit note and its associated invoice.
  - field: created_at
    current:
      description: null
      semantic_type: type/CreationTimestamp
      display_name: Created At
    new:
      description: The timestamp when the credit note was created
  - field: status
    current:
      description: null
      semantic_type: type/Category
      display_name: Status
    new:
      description: Status of this credit note, one of issued or void
  - field: type
    current:
      description: null
      semantic_type: type/Category
      display_name: Type
    new:
      description: Type of this credit note, one of pre_payment or post_payment. A pre_payment credit note means it was issued when the invoice was open. A post_payment credit note means it was issued when the invoice was paid.
  - field: reason
    current:
      description: null
      semantic_type: type/Category
      display_name: Reason
    new:
      description: Reason for issuing this credit note, one of duplicate, fraudulent, order_change, or product_unsatisfactory
  - field: amount
    current:
      description: null
      semantic_type: null
      display_name: Amount
    new:
      description: The integer amount in dollars representing the total amount of the credit note, including tax.
  - field: discount_amount
    current:
      description: null
      semantic_type: type/Discount
      display_name: Discount Amount
    new:
      description: The aggregate amounts in dollars calculated per discount for all line items.
  - field: subtotal
    current:
      description: null
      semantic_type: null
      display_name: Subtotal
    new:
      description: The integer amount in dollars representing the amount of the credit note, excluding exclusive tax and invoice level discounts.
  - field: total
    current:
      description: null
      semantic_type: null
      display_name: Total
    new:
      description: The integer amount in dollars representing the total amount of the credit note, including tax and all discount.
  - field: memo
    current:
      description: null
      semantic_type: null
      display_name: Memo
    new:
      description: Customer-facing text that appears on the credit note PDF.
  - field: invoice_id
    current:
      description: null
      semantic_type: null
      display_name: Invoice ID
    new:
      description: Foreign key to Stripe Invoice model
  - field: refund_id
    current:
      description: null
      semantic_type: null
      display_name: Refund ID
    new:
      description: Foreign key to Stripe Refund model
  - field: stripe_customer_id
    current:
      description: null
      semantic_type: type/Category
      display_name: Stripe Customer ID
    new:
      description: Foreign key to Stripe Customer model
  - field: customer_id
    current:
      description: null
      semantic_type: null
      display_name: Customer ID
    new:
      description: Foreign key to Customer model
- table: stripe_customer
  table_id: 2030
  dbt_model: stripe_customer
  dbt_source: data_products/stripe/schema.yml
  table_changes:
    description: Stripe customers. Read more at https://stripe.com/docs/api/customers
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Primary key
  - field: created_at
    current:
      description: null
      semantic_type: type/CreationTimestamp
      display_name: Created At
    new:
      description: The timestamp when the customer was created
  - field: is_delinquent
    current:
      description: null
      semantic_type: null
      display_name: Is Delinquent
    new:
      description: Indicates if the customer has any invoices whose payments have failed that have not been manually marked as closed or forgiven or whatever.
  - field: name
    current:
      description: null
      semantic_type: type/Name
      display_name: Name
    new:
      description: Name of the customer. This is a coalesce of name, description, and email.
  - field: email
    current:
      description: null
      semantic_type: type/Email
      display_name: Email
    new:
      description: Customer's email
  - field: country
    current:
      description: null
      semantic_type: type/Country
      display_name: Country
    new:
      description: Customer's country if available -- coalesce from billing, shipping, payment, and tax location.
  - field: state
    current:
      description: null
      semantic_type: null
      display_name: State
    new:
      description: Customer's state if available -- coalesce between billing, shipping, payment, and tax location.
  - field: city
    current:
      description: null
      semantic_type: type/City
      display_name: City
    new:
      description: Customer's city if available -- coalesce between billing, shipping, and payment.
  - field: zip
    current:
      description: null
      semantic_type: null
      display_name: Zip
    new:
      description: Customer's zip if available -- coalesce between billing, shipping, and payment.
  - field: tax_status
    current:
      description: null
      semantic_type: type/Category
      display_name: Tax Status
    new:
      description: 'Describes the customer’s tax exemption status, which is taxable, exempt, or reverse. When set to reverse, invoice and receipt PDFs include the following text: "Reverse charge".'
  - field: tax_automatic_support
    current:
      description: null
      semantic_type: type/Category
      display_name: Tax Automatic Support
    new:
      description: Surfaces if automatic tax computation is possible given the current customer location information.
  - field: tax_location_country
    current:
      description: null
      semantic_type: type/Country
      display_name: Tax Location Country
    new:
      description: The customer’s country as identified by Stripe Tax.
  - field: tax_location_state
    current:
      description: null
      semantic_type: null
      display_name: Tax Location State
    new:
      description: The customer’s state, county, province, or region as identified by Stripe Tax.
  - field: tax_location_city
    current:
      description: null
      semantic_type: null
      display_name: Tax Location City
    new:
      description: The customer’s city as inferred Tax Location Source
  - field: tax_location_zip
    current:
      description: null
      semantic_type: null
      display_name: Tax Location Zip
    new:
      description: The customer’s postal code as inferred by Tax Location Source
  - field: tax_location_source
    current:
      description: null
      semantic_type: type/Source
      display_name: Tax Location Source
    new:
      description: The data source used to infer the customer’s location.
  - field: billing_address_country
    current:
      description: null
      semantic_type: type/Country
      display_name: Billing Address Country
    new:
      description: Customer's billing address country
  - field: billing_address_state
    current:
      description: null
      semantic_type: null
      display_name: Billing Address State
    new:
      description: Customer's billing address state
  - field: billing_address_city
    current:
      description: null
      semantic_type: null
      display_name: Billing Address City
    new:
      description: Customer's billing address city
  - field: billing_address_zip
    current:
      description: null
      semantic_type: null
      display_name: Billing Address Zip
    new:
      description: Customer's billing address zip
  - field: billing_address_line_1
    current:
      description: null
      semantic_type: null
      display_name: Billing Address Line 1
    new:
      description: Customer's billing address line 1
  - field: billing_address_line_2
    current:
      description: null
      semantic_type: null
      display_name: Billing Address Line 2
    new:
      description: Customer's billing address line 2
  - field: shipping_address_country
    current:
      description: null
      semantic_type: type/Country
      display_name: Shipping Address Country
    new:
      description: Customer's shipping address country
  - field: shipping_address_state
    current:
      description: null
      semantic_type: null
      display_name: Shipping Address State
    new:
      description: Customer's shipping address state
  - field: shipping_address_city
    current:
      description: null
      semantic_type: null
      display_name: Shipping Address City
    new:
      description: Customer's shipping address city
  - field: shipping_address_zip
    current:
      description: null
      semantic_type: null
      display_name: Shipping Address Zip
    new:
      description: Customer's shipping address zip
  - field: shipping_address_line_1
    current:
      description: null
      semantic_type: null
      display_name: Shipping Address Line 1
    new:
      description: Customer's shipping address line 1
  - field: shipping_address_line_2
    current:
      description: null
      semantic_type: null
      display_name: Shipping Address Line 2
    new:
      description: Customer's shipping address line 2
  - field: payment_address_country
    current:
      description: null
      semantic_type: type/Country
      display_name: Payment Address Country
    new:
      description: Customer's payment address country
  - field: payment_address_state
    current:
      description: null
      semantic_type: null
      display_name: Payment Address State
    new:
      description: Customer's payment address state
  - field: payment_address_city
    current:
      description: null
      semantic_type: null
      display_name: Payment Address City
    new:
      description: Customer's payment address city
  - field: payment_address_zip
    current:
      description: null
      semantic_type: null
      display_name: Payment Address Zip
    new:
      description: Customer's payment address zip
  - field: payment_address_line_1
    current:
      description: null
      semantic_type: null
      display_name: Payment Address Line 1
    new:
      description: Customer's payment address line 1
  - field: payment_address_line_2
    current:
      description: null
      semantic_type: null
      display_name: Payment Address Line 2
    new:
      description: Customer's payment address line 2
  - field: invoice_prefix
    current:
      description: null
      semantic_type: null
      display_name: Invoice Prefix
    new:
      description: The prefix for the customer used to generate unique invoice numbers.
  - field: balance
    current:
      description: null
      semantic_type: null
      display_name: Balance
    new:
      description: Current balance, if any, being stored on the customer. If negative, the customer has credit to apply to their next invoice. If positive, the customer has an amount owed that will be added to their next invoice. The balance does not refer to any unpaid invoices; it solely takes into account amounts that have yet to be successfully applied to any invoice. This balance is only taken into account as invoices are finalized.
  - field: customer_id
    current:
      description: null
      semantic_type: null
      display_name: Customer ID
    new:
      description: Foreign key to Customer model
- table: stripe_invoice
  table_id: 2031
  dbt_model: stripe_invoice
  dbt_source: data_products/stripe/schema.yml
  table_changes:
    description: Invoices are statements of amounts owed by a customer, and are either generated one-off, or generated periodically from a subscription. They contain invoice items, and proration adjustments that may be caused by subscription upgrades/downgrades (if necessary). Read more at https://stripe.com/docs/api/invoices/object
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: Primary key
  - field: account_id
    current:
      description: null
      semantic_type: null
      display_name: Account ID
    new:
      description: Account identifier
  - field: month
    current:
      description: null
      semantic_type: null
      display_name: Month
    new:
      description: Month of the period end. This is the standard month used for revenue recognization.
  - field: created_at
    current:
      description: null
      semantic_type: type/CreationTimestamp
      display_name: Created At
    new:
      description: The timestamp when the invoice was created
  - field: period_started_at
    current:
      description: null
      semantic_type: type/CreationTimestamp
      display_name: Period Started At
    new:
      description: Start of the usage period during which invoice items were added to this invoice.
  - field: period_ended_at
    current:
      description: null
      semantic_type: null
      display_name: Period Ended At
    new:
      description: End of the usage period during which invoice items were added to this invoice.
  - field: due_at
    current:
      description: null
      semantic_type: null
      display_name: Due At
    new:
      description: The timestamp on which payment for this invoice is due. This value will be null for invoices where collection_method=charge_automatically.
  - field: finalized_at
    current:
      description: null
      semantic_type: null
      display_name: Finalized At
    new:
      description: The timestamp that the invoice draft was finalized.
  - field: paid_at
    current:
      description: null
      semantic_type: null
      display_name: Paid At
    new:
      description: The timestamp that the invoice was paid.
  - field: marked_uncollectible_at
    current:
      description: null
      semantic_type: null
      display_name: Marked Uncollectible At
    new:
      description: The timestamp that the invoice was marked uncollectible.
  - field: voided_at
    current:
      description: null
      semantic_type: null
      display_name: Voided At
    new:
      description: The timestamp that the invoice was voided.
  - field: customer_name
    current:
      description: null
      semantic_type: null
      display_name: Customer Name
    new:
      description: Customer's name
  - field: reference_number
    current:
      description: null
      semantic_type: null
      display_name: Reference Number
    new:
      description: A unique, identifying string that appears on emails sent to the customer for this invoice. This starts with the customer’s unique invoice_prefix if it is specified.
  - field: is_paid
    current:
      description: null
      semantic_type: null
      display_name: Is Paid
    new:
      description: Whether payment was successfully collected for this invoice. An invoice can be paid (most commonly) with a charge or with credit from the customer’s account balance.
  - field: is_auto_advance
    current:
      description: null
      semantic_type: null
      display_name: Is Auto Advance
    new:
      description: Controls whether Stripe will perform automatic collection of the invoice. When false, the invoice’s state will not automatically advance without an explicit action.
  - field: is_attempted
    current:
      description: null
      semantic_type: null
      display_name: Is Attempted
    new:
      description: Whether an attempt has been made to pay the invoice. An invoice is not attempted until 1 hour after creation, for example, so you might not want to display that invoice as unpaid to your users.
  - field: is_arr_source
    current:
      description: null
      semantic_type: null
      display_name: Is Arr Source
    new:
      description: Indicates if the invoice will be used in ARR computation in Monthly Revenue model.
      display_name: Is ARR Source
  - field: status
    current:
      description: null
      semantic_type: type/Category
      display_name: Status
    new:
      description: The status of the invoice, one of draft, open, paid, uncollectible, or void.
  - field: collection_method
    current:
      description: null
      semantic_type: type/Category
      display_name: Collection Method
    new:
      description: Either charge_automatically, or send_invoice. When charging automatically, Stripe will attempt to pay this invoice using the default source attached to the customer. When sending an invoice, Stripe will email this invoice to the customer with payment instructions.
  - field: total
    current:
      description: null
      semantic_type: null
      display_name: Total
    new:
      description: Total after discounts and taxes in dollars.
  - field: total_excluding_tax
    current:
      description: null
      semantic_type: null
      display_name: Total Excluding Tax
    new:
      description: Total after discounts but before taxes in dollars.
  - field: tax
    current:
      description: null
      semantic_type: null
      display_name: Tax
    new:
      description: Taxes in dollars.
  - field: amount_due
    current:
      description: null
      semantic_type: null
      display_name: Amount Due
    new:
      description: Final amount due at this time for this invoice in dollars. If the invoice’s total is smaller than the minimum charge amount, for example, or if there is account credit that can be applied to the invoice, the amount_due may be 0. If there is a positive starting_balance for the invoice (the customer owes money), the amount_due will also take that into account. The charge that gets generated for the invoice will be for the amount specified in amount_due.
  - field: amount_paid
    current:
      description: null
      semantic_type: null
      display_name: Amount Paid
    new:
      description: The amount, in dollars, that was paid.
  - field: amount_remaining
    current:
      description: null
      semantic_type: null
      display_name: Amount Remaining
    new:
      description: The difference between amount_due and amount_paid.
  - field: subscription_amount
    current:
      description: null
      semantic_type: null
      display_name: Subscription Amount
    new:
      description: The amount for the recurring subscription only included in the total, which excludes true-ups.
  - field: true_up_amount
    current:
      description: null
      semantic_type: null
      display_name: True Up Amount
    new:
      description: The amount of true-up (additional per-user usage fee above contracted) included in the total.
  - field: attempt_count
    current:
      description: null
      semantic_type: type/Quantity
      display_name: Attempt Count
    new:
      description: Number of payment attempts for this invoice
  - field: billing_address_country
    current:
      description: null
      semantic_type: type/Country
      display_name: Billing Address Country
    new:
      description: Invoice billing address country
  - field: billing_address_state
    current:
      description: null
      semantic_type: null
      display_name: Billing Address State
    new:
      description: Invoice billing address state
  - field: billing_address_city
    current:
      description: null
      semantic_type: null
      display_name: Billing Address City
    new:
      description: Invoice billing address city
  - field: billing_address_zip
    current:
      description: null
      semantic_type: null
      display_name: Billing Address Zip
    new:
      description: Invoice billing address zip
  - field: billing_address_line_1
    current:
      description: null
      semantic_type: null
      display_name: Billing Address Line 1
    new:
      description: Invoice billing address line 1
  - field: billing_address_line_2
    current:
      description: null
      semantic_type: null
      display_name: Billing Address Line 2
    new:
      description: Invoice billing address line 2
  - field: shipping_address_country
    current:
      description: null
      semantic_type: type/Country
      display_name: Shipping Address Country
    new:
      description: Invoice shipping address country
  - field: shipping_address_state
    current:
      description: null
      semantic_type: null
      display_name: Shipping Address State
    new:
      description: Invoice shipping address state
  - field: shipping_address_city
    current:
      description: null
      semantic_type: null
      display_name: Shipping Address City
    new:
      description: Invoice shipping address city
  - field: shipping_address_zip
    current:
      description: null
      semantic_type: null
      display_name: Shipping Address Zip
    new:
      description: Invoice shipping address zip
  - field: shipping_address_line_1
    current:
      description: null
      semantic_type: null
      display_name: Shipping Address Line 1
    new:
      description: Invoice shipping address line 1
  - field: shipping_address_line_2
    current:
      description: null
      semantic_type: null
      display_name: Shipping Address Line 2
    new:
      description: Invoice shipping address line 2
  - field: billing_cycle
    current:
      description: null
      semantic_type: type/Category
      display_name: Billing Cycle
    new:
      description: The billing cycle for the invoice
  - field: description
    current:
      description: null
      semantic_type: type/Description
      display_name: Description
    new:
      description: A long description on what the invoice is for. Generally, it is just a thank you note.
  - field: footer
    current:
      description: null
      semantic_type: type/Category
      display_name: Footer
    new:
      description: Text that appears at the bottom of the invoice. Generally, just Metabase address and tax info.
  - field: stripe_customer_id
    current:
      description: null
      semantic_type: null
      display_name: Stripe Customer ID
    new:
      description: Foreign key to Stripe Customer model
  - field: customer_id
    current:
      description: null
      semantic_type: null
      display_name: Customer ID
    new:
      description: Foreign key to Customer model
  - field: subscription_id
    current:
      description: null
      semantic_type: type/Subscription
      display_name: Subscription ID
    new:
      description: Foreign key to Stripe Subscription model
  - field: charge_id
    current:
      description: null
      semantic_type: null
      display_name: Charge ID
    new:
      description: Foreign key to Stripe Charge model
