- table: stg_customer_id_mappings
  table_id: 1912
  dbt_model: stg_customer_id_mappings
  dbt_source: staging/schema.yml
  table_changes:
    description: 'This model generates a unified view of important IDs related to a customers. It can be used to join information from different sources to a single customer. ## Caveats - Be aware that some customers might share the same email domain or other ids (e.g. pipedrive). When joining for multiple customers, this might cause duplicates in the result set. ## Playbook examples Get all ms store tokens for a customer (works similar for other ids): ```sql select customer_id, token from dbt_models_staging.stg_customer_id_mappings cross join unnest(ms_store_tokens) as token where customer_id = <id> ``` Get all deals for a customer in Pipedrive: ```sql select customer_id, deal_id from dbt_models_staging.stg_customer_id_mappings left join <deal-model> as deal on deal.organization_id = any(pipedrive_organization_ids) where customer_id = <id> ```'
  fields:
  - field: customer_id
    current:
      description: null
      semantic_type: null
      display_name: Customer ID
    new:
      description: A unique identifier for each customer.
  - field: account_ids
    current:
      description: null
      semantic_type: null
      display_name: Account Ids
    new:
      description: An array of unique account IDs associated with the customer.
  - field: ms_store_organization_ids
    current:
      description: null
      semantic_type: null
      display_name: Ms Store Organization Ids
    new:
      description: An array of organization IDs from the Metabase Store associated with the customer.
  - field: email_domains
    current:
      description: null
      semantic_type: null
      display_name: Email Domains
    new:
      description: An array of distinct email domains linked to the customer’s accounts. Be aware that some customers might share the same email domain.
  - field: ms_store_tokens
    current:
      description: null
      semantic_type: null
      display_name: Ms Store Tokens
    new:
      description: An array of tokens from the Metabase Store associated with the customer.
  - field: stripe_customer_ids
    current:
      description: null
      semantic_type: null
      display_name: Stripe Customer Ids
    new:
      description: An array of Stripe customer IDs associated with the customer.
  - field: pipedrive_organization_ids
    current:
      description: null
      semantic_type: null
      display_name: Pipedrive Organization Ids
    new:
      description: An array of Pipedrive organization IDs associated with the customer.
  - field: pipedrive_lead_ids
    current:
      description: null
      semantic_type: null
      display_name: Pipedrive Lead Ids
    new:
      description: An array of Pipedrive lead IDs associated with the customer.
- table: stg_github_workflow_job
