  dbt_source: staging/schema.yml
  table_changes:
    description: 'Staging model that unions workflow job data from two sources: data_tools (workflow_job) and fivetran (workflow_run_job). Date filtering prevents duplicate records during the overlap period around the 2025-11-21 switchover.'
  fields:
  - field: id
    current:
      description: null
      semantic_type: type/PK
      display_name: ID
    new:
      description: GitHub workflow job ID
  - field: name
    current:
      description: null
      semantic_type: type/Name
      display_name: Name
    new:
      description: Name of the job as defined in the workflow YAML
  - field: created_at
    current:
      description: null
      semantic_type: type/CreationTimestamp
      display_name: Created At
    new:
      description: Timestamp when the job was created
  - field: started_at
    current:
      description: null
      semantic_type: type/CreationTimestamp
      display_name: Started At
    new:
      description: Timestamp when the job started executing
  - field: completed_at
    current:
      description: null
      semantic_type: null
      display_name: Completed At
    new:
      description: Timestamp when the job finished executing
  - field: status
    current:
      description: null
      semantic_type: type/Category
      display_name: Status
    new:
      description: Current status of the job (e.g., queued, in_progress, completed)
  - field: conclusion
    current:
      description: null
      semantic_type: type/Category
      display_name: Conclusion
    new:
      description: Final result of the job (e.g., success, failure, cancelled)
  - field: workflow_name
    current:
      description: null
      semantic_type: null
      display_name: Workflow Name
    new:
      description: Name of the parent workflow
  - field: run_attempt
    current:
      description: null
      semantic_type: null
      display_name: Run Attempt
    new:
      description: Which attempt number this job belongs to (workflows can be re-run)
  - field: labels
    current:
      description: null
      semantic_type: type/Category
      display_name: Labels
    new:
      description: Labels associated with the runner that executed the job
  - field: runner_name
    current:
      description: null
      semantic_type: null
      display_name: Runner Name
    new:
      description: Name of the runner that executed the job
  - field: runner_group_name
    current:
      description: null
      semantic_type: type/Category
      display_name: Runner Group Name
    new:
