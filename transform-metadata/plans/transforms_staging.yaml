- table: stg_signup_utm_attribution
  table_id: 1996
  dbt_model: stg_signup_utm_attribution
  dbt_source: staging/schema.yml
  table_changes:
    description: 'Model that consolidates all UTMs seen for a stripe customer. There are different sources where we can get signals of UTM touchpoints: 1. website_page_view -> identified - where we know the cookie and can look across sessions 2. website_page_view_anonymous -> anonymous - where we can only look at attributions of page views with subscription ids 3. utms we store in Metabasestore -> when they are present in the signup form (likely already seen in 1 or 2) 4. utms we store in Pipedrive -> when they are present in the lead form likely not seen in 1 or 2 since no subscription id in pageview params'
  fields:
  - field: stripe_customer_id
    current:
      description: null
      semantic_type: null
      display_name: Stripe Customer ID
    new:
      description: Id of the Stripe customer
  - field: utm_medium
    current:
      description: null
      semantic_type: null
      display_name: Utm Medium
    new: no change
  - field: utm_source
    current:
      description: null
      semantic_type: null
      display_name: Utm Source
    new: no change
  - field: utm_campaign
    current:
      description: null
      semantic_type: null
      display_name: Utm Campaign
    new: no change
  - field: utm_content
    current:
      description: null
      semantic_type: null
      display_name: Utm Content
    new: no change
  - field: utm_term
    current:
      description: null
      semantic_type: null
      display_name: Utm Term
    new: no change
  - field: first_seen_at
    current:
      description: null
      semantic_type: null
      display_name: First Seen At
    new:
      description: Timestamp when the UTM combination was first seen.
  - field: last_seen_at
    current:
      description: null
      semantic_type: null
      display_name: Last Seen At
    new:
      description: Timestamp when the UTM combination was last seen.
  - field: is_first_touch
    current:
      description: null
      semantic_type: null
      display_name: Is First Touch
    new:
      description: Boolean indicating if the UTM combination was the first seen for the stripe customer.
  - field: is_last_touch
    current:
      description: null
      semantic_type: null
      display_name: Is Last Touch
    new:
      description: Boolean indicating if the UTM combination was the last seen for the stripe customer before signup.
  - field: interaction_order
    current:
      description: null
      semantic_type: null
      display_name: Interaction Order
    new:
      description: Order in which this UTM combination was seen for the stripe customer before signup.
